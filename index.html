<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta property="og:title" content="Happy Birthday Mwiza sir J,...! ??">
    <meta property="og:description" content="Nkwifurije kuramba - Happy Birthday!">
    <meta property="og:image" content="tunga.jpg">
    <meta property="og:type" content="website">
    <title>Happy Birthday - Tunga</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            background: #0a0a0a;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Georgia', 'Times New Roman', serif;
            overflow: hidden;
            position: relative;
        }

        /* Stars with circular shadows */
        .stars-container {
            position: absolute;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }

        .star {
            position: absolute;
            color: #ffd700;
            font-size: 20px;
            text-shadow: 0 0 10px rgba(255, 215, 0, 0.8),
                         0 0 20px rgba(255, 215, 0, 0.6),
                         0 0 30px rgba(255, 215, 0, 0.4);
            animation: twinkle 3s infinite ease-in-out;
        }

        .star:nth-child(1) { top: 10%; left: 10%; animation-delay: 0s; font-size: 18px; }
        .star:nth-child(2) { top: 20%; left: 80%; animation-delay: 0.5s; font-size: 24px; }
        .star:nth-child(3) { top: 60%; left: 15%; animation-delay: 1s; font-size: 16px; }
        .star:nth-child(4) { top: 70%; left: 85%; animation-delay: 1.5s; font-size: 22px; }
        .star:nth-child(5) { top: 40%; left: 5%; animation-delay: 2s; font-size: 20px; }
        .star:nth-child(6) { top: 30%; left: 90%; animation-delay: 0.3s; font-size: 19px; }
        .star:nth-child(7) { top: 80%; left: 25%; animation-delay: 0.8s; font-size: 21px; }
        .star:nth-child(8) { top: 15%; left: 50%; animation-delay: 1.2s; font-size: 17px; }
        .star:nth-child(9) { top: 55%; left: 70%; animation-delay: 1.8s; font-size: 23px; }
        .star:nth-child(10) { top: 85%; left: 60%; animation-delay: 2.2s; font-size: 18px; }

        @keyframes twinkle {
            0%, 100% { opacity: 0.6; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.2); }
        }

        /* Moving hearts animation */
        .hearts-container {
            position: absolute;
            width: 100%;
            height: 100%;
            pointer-events: none;
            overflow: hidden;
        }

        .heart {
            position: absolute;
            color: #ff6b9d;
            font-size: 24px;
            animation: moveHearts 8s linear infinite;
            opacity: 0.8;
            text-shadow: 0 0 10px rgba(255, 107, 157, 0.6);
        }

        .heart:nth-child(1) { top: 20%; animation-delay: 0s; font-size: 20px; }
        .heart:nth-child(2) { top: 40%; animation-delay: 1.5s; font-size: 28px; }
        .heart:nth-child(3) { top: 60%; animation-delay: 3s; font-size: 22px; }
        .heart:nth-child(4) { top: 80%; animation-delay: 4.5s; font-size: 26px; }
        .heart:nth-child(5) { top: 30%; animation-delay: 6s; font-size: 24px; }
        .heart:nth-child(6) { top: 50%; animation-delay: 0.8s; font-size: 30px; }
        .heart:nth-child(7) { top: 70%; animation-delay: 2.3s; font-size: 18px; }
        .heart:nth-child(8) { top: 90%; animation-delay: 3.8s; font-size: 25px; }

        @keyframes moveHearts {
            0% {
                left: -50px;
                transform: translateY(0) rotate(0deg);
            }
            25% {
                transform: translateY(-20px) rotate(5deg);
            }
            50% {
                transform: translateY(0) rotate(0deg);
            }
            75% {
                transform: translateY(20px) rotate(-5deg);
            }
            100% {
                left: 100%;
                transform: translateY(0) rotate(0deg);
            }
        }

        /* Main content */
        .main-content {
            position: relative;
            z-index: 10;
            text-align: center;
            padding: 20px;
        }

        /* Happy Birthday Title */
        .birthday-title {
            color: #ffd700;
            font-size: 2.2em;
            font-weight: bold;
            letter-spacing: 8px;
            margin-bottom: 40px;
            text-shadow: 0 0 20px rgba(255, 215, 0, 0.5),
                         0 0 40px rgba(255, 215, 0, 0.3);
            animation: glow 2s ease-in-out infinite alternate;
        }

        @keyframes glow {
            from { text-shadow: 0 0 20px rgba(255, 215, 0, 0.5), 0 0 40px rgba(255, 215, 0, 0.3); }
            to { text-shadow: 0 0 30px rgba(255, 215, 0, 0.8), 0 0 60px rgba(255, 215, 0, 0.5); }
        }

        /* Combined layout: circle + message box */
        .combined-container {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 30px;
            flex-wrap: wrap;
        }

        /* Circular image container */
        .circle-container {
            position: relative;
            width: 280px;
            height: 280px;
            border-radius: 50%;
            overflow: hidden;
            box-shadow: 0 0 60px rgba(255, 215, 0, 0.4),
                        0 0 100px rgba(255, 107, 157, 0.3),
                        inset 0 0 30px rgba(255, 255, 255, 0.1);
            border: 6px solid #ffd700;
            animation: float 4s ease-in-out infinite;
            flex-shrink: 0;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-15px); }
        }

        .circle-container img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            object-position: bottom center;
        }

        /* Message box - rounded rectangle shape */
        .message-box {
            background: rgba(20, 20, 20, 0.9);
            border: 2px solid #ffd700;
            border-radius: 25px;
            padding: 30px 35px;
            max-width: 380px;
            box-shadow: 0 0 40px rgba(255, 215, 0, 0.2),
                        0 0 80px rgba(255, 107, 157, 0.15);
            position: relative;
            animation: float 4s ease-in-out infinite;
        }

        .message-box::before {
            content: '';
            position: absolute;
            left: -20px;
            top: 50%;
            transform: translateY(-50%);
            width: 0;
            height: 0;
            border-top: 15px solid transparent;
            border-bottom: 15px solid transparent;
            border-right: 20px solid #ffd700;
        }

        .message-box::after {
            content: '';
            position: absolute;
            left: -14px;
            top: 50%;
            transform: translateY(-50%);
            width: 0;
            height: 0;
            border-top: 12px solid transparent;
            border-bottom: 12px solid transparent;
            border-right: 17px solid rgba(20, 20, 20, 0.9);
        }

        .message-box .kinyarwanda {
            color: #ffd700;
            font-size: 1.15em;
            font-weight: 600;
            margin-bottom: 10px;
            text-shadow: 0 2px 4px rgba(0,0,0,0.8);
            line-height: 1.5;
        }

        .message-box .english {
            color: #ffffff;
            font-size: 1em;
            font-style: italic;
            text-shadow: 0 2px 4px rgba(0,0,0,0.8);
            line-height: 1.5;
        }

        /* Responsive */
        @media (max-width: 700px) {
            .combined-container {
                flex-direction: column;
                gap: 25px;
            }

            .message-box::before,
            .message-box::after {
                display: none;
            }

            .birthday-title {
                font-size: 1.6em;
                letter-spacing: 4px;
            }

            .circle-container {
                width: 220px;
                height: 220px;
            }

            .message-box {
                padding: 25px 28px;
                max-width: 300px;
            }

            .message-box .kinyarwanda {
                font-size: 1em;
            }

            .message-box .english {
                font-size: 0.9em;
            }
        }
    </style>
</head>
<body>
    <!-- Stars -->
    <div class="stars-container">
        <div class="star">★</div>
        <div class="star">★</div>
        <div class="star">★</div>
        <div class="star">★</div>
        <div class="star">★</div>
        <div class="star">★</div>
        <div class="star">★</div>
        <div class="star">★</div>
        <div class="star">★</div>
        <div class="star">★</div>
    </div>

    <!-- Moving Hearts -->
    <div class="hearts-container">
        <div class="heart">❤️</div>
        <div class="heart">💖</div>
        <div class="heart">💕</div>
        <div class="heart">💗</div>
        <div class="heart">💓</div>
        <div class="heart">💝</div>
        <div class="heart">💘</div>
        <div class="heart">❤️</div>
    </div>

    <!-- Main Content -->
    <div class="main-content">
        <h1 class="birthday-title">HAPPY BIRTHDAY Mwiza sir J,...</h1>
        
        <div class="combined-container">
            <div class="circle-container">
                <img src="tunga.jpg" alt="Tunga - Birthday Person">
            </div>

            <div class="message-box">
                <p class="kinyarwanda">Tunga, Ugwize ni wowe mugabo mwiza kwisi.</p>
                <p class="english">Nkwifurije kuramba 🎉</p>
            </div>
        </div>
    </div>

    <script>
        // Add more dynamic hearts occasionally
        function createHeart() {
            const heartsContainer = document.querySelector('.hearts-container');
            const heart = document.createElement('div');
            heart.className = 'heart';
            heart.innerHTML = ['❤️', '💖', '💕', '💗', '💓', '💝'][Math.floor(Math.random() * 6)];
            heart.style.top = Math.random() * 100 + '%';
            heart.style.fontSize = (Math.random() * 20 + 18) + 'px';
            heart.style.animationDuration = (Math.random() * 4 + 6) + 's';
            heartsContainer.appendChild(heart);

            // Remove heart after animation
            setTimeout(() => {
                heart.remove();
            }, 10000);
        }

        // Create new hearts every 2 seconds
        setInterval(createHeart, 2000);
    </script>
</body>
</html>
